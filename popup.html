<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 280px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #333;
      line-height: 1.5;
    }
    h2 {
      margin: 0 0 10px;
      font-size: 15px;
    }
    p {
      margin: 0 0 8px;
    }
    code {
      background: #f0f0f0;
      padding: 1px 4px;
      border-radius: 3px;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <h2>Archive.today Lookup</h2>
  <p>Right-click any link and select <strong>"Look up on Archive.today"</strong> to open its archived snapshot.</p>
  <p>Right-click the page background and select <strong>"Scan page for archives"</strong> to find all archived links on the current site.</p>
</body>
</html>

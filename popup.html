<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 280px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #333;
      line-height: 1.5;
    }
    h2 {
      margin: 0 0 12px;
      font-size: 15px;
    }
    p {
      margin: 0 0 10px;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-top: 1px solid #eee;
      margin-top: 4px;
    }
    .toggle-label {
      font-weight: 500;
    }
    .toggle-desc {
      font-size: 12px;
      color: #666;
      margin-top: 2px;
    }
    .switch {
      position: relative;
      width: 36px;
      height: 20px;
      flex-shrink: 0;
      margin-left: 12px;
    }
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #ccc;
      border-radius: 20px;
      transition: background 0.2s;
    }
    .slider::before {
      content: "";
      position: absolute;
      height: 14px;
      width: 14px;
      left: 3px;
      bottom: 3px;
      background: white;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .switch input:checked + .slider {
      background: #1a73e8;
    }
    .switch input:checked + .slider::before {
      transform: translateX(16px);
    }
  </style>
</head>
<body>
  <h2>Archive.today Lookup</h2>
  <p>Right-click any link to look up its archived snapshot, or right-click the page to scan all visible links.</p>
  <div class="toggle-row">
    <div>
      <div class="toggle-label">Auto-scan</div>
      <div class="toggle-desc">Scan on page load and as you scroll</div>
    </div>
    <label class="switch">
      <input type="checkbox" id="auto-scan">
      <span class="slider"></span>
    </label>
  </div>
  <script src="popup.js"></script>
</body>
</html>

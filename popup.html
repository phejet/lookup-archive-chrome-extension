<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        width: 260px;
        padding: 16px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 13px;
        color: #333;
        line-height: 1.5;
      }
      h2 {
        margin: 0 0 4px;
        font-size: 15px;
      }
      p {
        margin: 0 0 12px;
        font-size: 12px;
        color: #666;
      }
      .donate {
        border-top: 1px solid #eee;
        padding-top: 10px;
        text-align: center;
      }
      .donate a {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 12px;
        background: #ffdd00;
        color: #000;
        text-decoration: none;
        border-radius: 6px;
        font-size: 12px;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <h2>Archive Lookup</h2>
    <p>Right-click any link to look up its archived snapshot.</p>
    <div class="donate">
      <a href="https://buymeacoffee.com/fumbledpelican" target="_blank" rel="noopener noreferrer">
        <img src="icons/bmc-logo.svg" alt="" width="15" height="21" />
        Buy me a coffee
      </a>
    </div>
  </body>
</html>

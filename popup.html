<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      color: #333;
    }
    h2 {
      margin: 0 0 12px;
      font-size: 16px;
    }
    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    #prefix-input {
      flex: 1;
      padding: 6px 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
    }
    #add-btn {
      padding: 6px 12px;
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }
    #add-btn:hover {
      background: #1557b0;
    }
    .prefix-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .prefix-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 8px;
      border-bottom: 1px solid #eee;
    }
    .prefix-item span {
      font-family: monospace;
      font-size: 13px;
    }
    .remove-btn {
      background: none;
      border: none;
      color: #d93025;
      cursor: pointer;
      font-size: 16px;
      padding: 0 4px;
    }
    .remove-btn:hover {
      color: #a50e0e;
    }
    .empty {
      color: #999;
      font-style: italic;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <h2>URL Prefixes to Scan</h2>
  <div class="input-row">
    <input type="text" id="prefix-input" placeholder="e.g. afr.com">
    <button id="add-btn">Add</button>
  </div>
  <ul class="prefix-list" id="prefix-list"></ul>
  <script src="popup.js"></script>
</body>
</html>
